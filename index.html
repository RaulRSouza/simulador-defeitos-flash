<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Defeitos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a1a; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    #container {
      width: 800px;
      height: 600px;
      max-width: 100vw;
      position: relative;
    }
    #container ruffle-player {
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #ccc;
      font-size: 14px;
      gap: 12px;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error {
      display: none;
      position: absolute;
      inset: 0;
      background: #111;
      color: #e94560;
      font-size: 13px;
      padding: 20px;
      white-space: pre-wrap;
    }
  </style>
  <!-- Config MUST be set before ruffle.js loads -->
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      publicPath: "./ruffle/",
      autoplay: "on",
      unmuteOverlay: "hidden",
      allowScriptAccess: "always",
      backgroundColor: "#000000",
    };
  </script>
  <script src="ruffle/ruffle.js"></script>
</head>
<body>
  <div id="container">
    <div id="loading">
      <div class="spinner"></div>
      <span>Carregando Simulador...</span>
    </div>
    <div id="error"></div>
  </div>

  <script>
    window.addEventListener("load", async () => {
      const loading = document.getElementById("loading");
      const errorDiv = document.getElementById("error");

      try {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        player.style.width = "100%";
        player.style.height = "100%";

        const container = document.getElementById("container");
        container.appendChild(player);

        await player.load({
          url: "Simulador.swf",
          allowScriptAccess: "always",
          autoplay: "on",
          unmuteOverlay: "hidden",
          quality: "high",
          scale: "showall",
          salign: "tl",
          wmode: "opaque",
        });

        loading.style.display = "none";
      } catch (e) {
        loading.style.display = "none";
        errorDiv.style.display = "flex";
        errorDiv.style.alignItems = "center";
        errorDiv.style.justifyContent = "center";
        errorDiv.textContent = "Erro ao carregar o simulador:\n" + e.message;
      }
    });
  </script>
</body>
</html>
