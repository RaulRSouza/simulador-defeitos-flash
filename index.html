<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Defeitos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a1a; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    #container {
      width: 800px;
      height: 600px;
      max-width: 100vw;
      position: relative;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #aaa;
      font-size: 14px;
      gap: 14px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Service worker must be registered FIRST to intercept requests with COOP/COEP headers -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("coi-serviceworker.js").then(function (reg) {
        // If the service worker is newly installed, reload to activate isolation
        if (!navigator.serviceWorker.controller) {
          window.location.reload();
        }
      });
    }
  </script>

  <!-- Config MUST be set before ruffle.js loads -->
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      publicPath: "./ruffle/",
      autoplay: "on",
      unmuteOverlay: "hidden",
      allowScriptAccess: "always",
      backgroundColor: "#000000",
      letterbox: "off",
    };
  </script>
  <script src="ruffle/ruffle.js"></script>
</head>
<body>
  <div id="container">
    <div id="loading">
      <div class="spinner"></div>
      <span>Carregando Simulador de Defeitos...</span>
    </div>
  </div>

  <script>
    window.addEventListener("load", async () => {
      const loading = document.getElementById("loading");
      try {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        player.style.width = "100%";
        player.style.height = "100%";
        document.getElementById("container").appendChild(player);

        await player.load({
          url: "Simulador.swf",
          allowScriptAccess: "always",
          autoplay: "on",
          quality: "high",
          scale: "showall",
        });

        loading.style.display = "none";
      } catch (e) {
        loading.innerHTML = "<span style='color:#e94560'>Erro: " + e.message + "</span>";
      }
    });
  </script>
</body>
</html>
